<div class="border-t border-gray-100 pt-4 mt-2">
  <form id="rule-set-form" hx-post="/config/rule-sets/{{ name }}/save" hx-target="#rule-save-status" hx-swap="innerHTML">
    <input type="hidden" name="name" value="{{ name }}">
    <div class="grid grid-cols-2 gap-x-6 gap-y-4 mb-5">
      <div class="space-y-1.5">
        <label class="text-xs font-medium text-gray-500">显示名称</label>
        <input name="display_name" value="{{ data.display_name }}" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-100">
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-medium text-gray-500">标识</label>
        <input value="{{ name }}" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-400" disabled>
      </div>
      <div class="col-span-2 space-y-1.5">
        <label class="text-xs font-medium text-gray-500">描述</label>
        <textarea name="description" rows="2" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-100">{{ data.description }}</textarea>
      </div>
    </div>

    <!-- 规则列表 -->
    <div class="space-y-3 mb-5" id="rules-container">
      {% for rule in data.rules %}
      <div class="rule-card border border-gray-100 rounded-lg p-4 hover:border-amber-200 transition-all">
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs font-mono text-gray-400 bg-gray-50 px-2 py-0.5 rounded">{{ rule.rule_id }}</span>
          <button type="button" onclick="this.closest('.rule-card').remove()"
                  class="text-xs text-gray-300 hover:text-red-500 transition-all cursor-pointer bg-transparent border-none">✕ 删除</button>
        </div>
        <div class="space-y-3">
          <div class="space-y-1">
            <label class="text-xs text-gray-400">规则名称</label>
            <input name="rule_name_{{ loop.index0 }}" value="{{ rule.name }}"
                   class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm outline-none focus:border-amber-400">
          </div>
          <div class="space-y-1">
            <label class="text-xs text-gray-400">描述</label>
            <textarea name="rule_desc_{{ loop.index0 }}" rows="2"
                      class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm outline-none focus:border-amber-400">{{ rule.description }}</textarea>
          </div>
          <div class="space-y-1">
            <label class="text-xs text-gray-400">检测逻辑</label>
            <textarea name="rule_logic_{{ loop.index0 }}" rows="3"
                      class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm outline-none focus:border-amber-400 font-mono text-xs">{{ rule.detection_logic }}</textarea>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>

    <input type="hidden" name="rules_json" id="rules-json-input">

    <div class="flex items-center gap-3">
      <button type="button" onclick="addRule()"
              class="px-4 py-2 text-xs font-medium text-amber-600 hover:text-amber-700 hover:bg-amber-50 border border-dashed border-amber-200 rounded-lg transition-all cursor-pointer">
        + 添加规则
      </button>
      <button type="button" onclick="saveRuleSet()"
              class="px-5 py-2 text-xs font-medium text-white bg-amber-600 hover:bg-amber-500 rounded-lg transition-all cursor-pointer shadow-sm">
        保存规则集
      </button>
    </div>
    <div id="rule-save-status" class="mt-3"></div>
  </form>
</div>

<script>
function saveRuleSet() {
  const container = document.getElementById('rules-container');
  const cards = container.querySelectorAll('.rule-card');
  const rules = [];
  cards.forEach(function(card, idx) {
    var name = card.querySelector('[name^="rule_name_"]').value;
    var desc = card.querySelector('[name^="rule_desc_"]').value;
    var logic = card.querySelector('[name^="rule_logic_"]').value;
    var idSpan = card.querySelector('.text-xs.font-mono');
    rules.push({
      rule_id: idSpan ? idSpan.textContent.trim() : 'R' + String(idx + 1).padStart(2, '0'),
      name: name,
      description: desc,
      detection_logic: logic,
    });
  });
  // 重新编号
  rules.forEach(function(r, i) {
    r.rule_id = 'R' + String(i + 1).padStart(2, '0');
  });
  document.getElementById('rules-json-input').value = JSON.stringify(rules);
  document.getElementById('rule-set-form').dispatchEvent(new Event('submit', {cancelable: true}));
}
function addRule() {
  const container = document.getElementById('rules-container');
  const count = container.querySelectorAll('.rule-card').length;
  const idx = 'new_' + Date.now();
  const html = '<div class="rule-card border border-gray-100 rounded-lg p-4 hover:border-amber-200 transition-all">' +
    '<div class="flex items-center justify-between mb-3">' +
      '<span class="text-xs font-mono text-gray-400 bg-gray-50 px-2 py-0.5 rounded">R' + String(count + 1).padStart(2, '0') + '</span>' +
      '<button type="button" onclick="this.closest(\'.rule-card\').remove()" class="text-xs text-gray-300 hover:text-red-500 transition-all cursor-pointer bg-transparent border-none">✕ 删除</button>' +
    '</div>' +
    '<div class="space-y-3">' +
      '<div class="space-y-1"><label class="text-xs text-gray-400">规则名称</label><input name="rule_name_' + idx + '" value="" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm outline-none focus:border-amber-400"></div>' +
      '<div class="space-y-1"><label class="text-xs text-gray-400">描述</label><textarea name="rule_desc_' + idx + '" rows="2" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm outline-none focus:border-amber-400"></textarea></div>' +
      '<div class="space-y-1"><label class="text-xs text-gray-400">检测逻辑</label><textarea name="rule_logic_' + idx + '" rows="3" class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm outline-none focus:border-amber-400 font-mono text-xs"></textarea></div>' +
    '</div>' +
  '</div>';
  container.insertAdjacentHTML('beforeend', html);
}
</script>
