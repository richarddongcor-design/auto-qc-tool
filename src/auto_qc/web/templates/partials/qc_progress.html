<div id="progress-{{ task_id }}"
     {% if not task or task.status == "running" %}
     hx-get="/qc/progress/{{ task_id }}" hx-trigger="every 2s" hx-swap="outerHTML"
     {% endif %}>
  {% if not task %}
  <div class="card p-6 mb-4">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-3">
        <span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium bg-amber-50 text-amber-600">质检中</span>
        <span class="text-sm font-medium">{{ task_id }}</span>
      </div>
    </div>
    <div class="w-full h-1 bg-gray-100 rounded-full overflow-hidden mb-2">
      <div class="h-full bg-amber-600 rounded-full transition-all duration-500" style="width: 0%"></div>
    </div>
    <div class="text-xs text-gray-400">正在启动...</div>
  </div>
  {% elif task.status == "running" %}
  <div class="card p-6 mb-4">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-3">
        <span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium bg-amber-50 text-amber-600">质检中</span>
        <span class="text-sm font-medium">{{ task_id }}</span>
      </div>
    </div>
    <div class="w-full h-1 bg-gray-100 rounded-full overflow-hidden mb-2">
      <div class="h-full bg-amber-600 rounded-full transition-all duration-500" style="width: {{ task.progress }}%"></div>
    </div>
    <div class="text-xs text-gray-400 mb-3">处理中，查看实时日志：</div>
    <div hx-get="/qc/logs/{{ task_id }}" hx-trigger="every 2s" hx-swap="outerHTML">
      <div class="bg-gray-900 rounded-lg p-4 font-mono text-xs max-h-[500px] overflow-y-auto" style="font-family: 'Cascadia Code', 'Fira Code', monospace;">
        <div class="text-gray-500 italic">加载中...</div>
      </div>
    </div>
  </div>
  {% elif task.status == "completed" %}
  <div hx-get="/qc/result/{{ task_id }}" hx-trigger="load" hx-swap="outerHTML"></div>
  {% elif task.status == "failed" %}
  <div class="card p-6 mb-4">
    <div class="flex items-center gap-3 mb-3">
      <span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium bg-red-50 text-red-600">运行失败</span>
      <span class="text-sm font-medium">{{ task_id }}</span>
    </div>
    <div class="text-sm text-red-500 mb-3">{{ task.error }}</div>
    <div hx-get="/qc/logs/{{ task_id }}" hx-trigger="load" hx-swap="innerHTML">
      <div class="bg-gray-900 rounded-lg p-4 font-mono text-xs max-h-[500px] overflow-y-auto" style="font-family: 'Cascadia Code', 'Fira Code', monospace;">
        <div class="text-gray-500 italic">加载日志...</div>
      </div>
    </div>
  </div>
  {% endif %}
</div>
