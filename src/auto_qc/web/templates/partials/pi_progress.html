<div id="progress-{{ task_id }}"
     {% if not task or task.status == "running" %}
     hx-get="/pi/progress/{{ task_id }}" hx-trigger="every 3s" hx-swap="outerHTML"
     {% endif %}>
  {% if not task or task.status == "running" %}
  <div class="card py-14 mb-5 flex flex-col items-center justify-center gap-5">
    <span class="inline-flex items-center px-3 py-1 rounded-md text-sm font-medium bg-amber-50 text-amber-600">挖掘中</span>
    <div class="relative w-16 h-16">
      <div class="absolute inset-0 rounded-full border-4 border-amber-100"></div>
      <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-amber-500 animate-spin" style="animation-duration: 1.2s"></div>
      <div class="absolute inset-0 rounded-full border-4 border-transparent border-b-amber-300 animate-spin" style="animation-duration: 0.8s; animation-direction: reverse;"></div>
    </div>
    <div class="text-xs text-gray-400">正在运行，请稍候...</div>
  </div>
  {% elif task.status == "completed" %}
  <div hx-get="/pi/result/{{ task_id }}" hx-trigger="load" hx-swap="outerHTML"></div>
  {% elif task.status == "failed" %}
  <div class="card p-8 mb-5">
    <div class="flex items-center gap-3 mb-3">
      <span class="inline-flex items-center px-3 py-1 rounded-md text-xs font-medium bg-red-50 text-red-600">运行失败</span>
      <span class="text-sm font-medium">{{ task_id }}</span>
    </div>
    <div class="text-sm text-red-500">{{ task.error }}</div>
  </div>
  <span hx-get="/pi/history" hx-target="#history-list" hx-trigger="load" hx-swap="innerHTML" class="hidden"></span>
  {% endif %}
</div>
