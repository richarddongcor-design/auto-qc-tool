{% extends "base.html" %}
{% block title %}质检 — Auto-QC{% endblock %}
{% block content %}

<div class="card p-8 mb-5">
  <form id="qc-form" hx-post="/qc/start" hx-target="#result-area" hx-swap="innerHTML"
        enctype="multipart/form-data">
    <div class="mb-6">
      <label class="text-xs font-medium text-gray-500 mb-2 block">质检规则</label>
      <select name="rule_sets" class="max-w-xs" id="rule-sets-select">
        {% for rs in rule_sets %}
        <option value="{{ rs.name }}">{{ rs.display_name }}（{{ rs.rule_count }} 条规则）</option>
        {% endfor %}
      </select>
    </div>
    <div class="flex items-end gap-5">
      <div class="flex-1">
        <label class="text-xs font-medium text-gray-500 mb-2 block">待质检文件</label>
        <div id="dropzone"
             class="border-2 border-dashed border-gray-200 rounded-xl py-5 px-6 text-center hover:border-amber-300 cursor-pointer transition-colors"
             onclick="document.getElementById('file-input').click()">
          <div id="dropzone-text" class="text-gray-400 text-sm">点击上传或拖拽 Excel 文件</div>
          <div id="dropzone-hint" class="text-xs text-gray-300 mt-1">.xlsx</div>
        </div>
        <input id="file-input" type="file" name="file" accept=".xlsx" class="hidden" required onchange="handleFileSelect(this)">
      </div>
      <button type="submit" class="px-12 py-3 bg-amber-600 hover:bg-amber-500 active:bg-amber-700 text-white text-base font-semibold rounded-xl transition-all cursor-pointer shadow-sm hover:shadow-md active:scale-[0.97] border border-amber-500 shrink-0">开始质检</button>
    </div>
  </form>
</div>

<script>
function handleFileSelect(input) {
  if (input.files && input.files[0]) {
    document.getElementById('dropzone-text').textContent = input.files[0].name;
    document.getElementById('dropzone-hint').textContent = '✓ 已就绪';
    document.getElementById('dropzone').className = 'border-2 border-amber-300 bg-amber-50/30 rounded-xl py-5 px-6 text-center cursor-pointer transition-colors';
  }
}
var dz = document.getElementById('dropzone');
dz.addEventListener('dragover', function(e){e.preventDefault();this.className='border-2 border-amber-400 bg-amber-50/50 rounded-xl py-5 px-6 text-center cursor-pointer transition-colors';});
dz.addEventListener('dragleave', function(e){e.preventDefault();if(!document.getElementById('file-input').files[0]){this.className='border-2 border-dashed border-gray-200 rounded-xl py-5 px-6 text-center hover:border-amber-300 cursor-pointer transition-colors';}});
dz.addEventListener('drop', function(e){e.preventDefault();var f=e.dataTransfer.files[0];if(f){document.getElementById('file-input').files=e.dataTransfer.files;handleFileSelect(document.getElementById('file-input'));}});
</script>

<div class="mb-5">
  <a href="/tools/template/download"
     class="inline-flex items-center gap-2 px-4 py-2 text-xs font-medium text-amber-600 hover:text-amber-700 border border-amber-200 hover:border-amber-400 rounded-lg transition-all no-underline">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
    下载数据模板
  </a>
</div>

<div id="result-area"></div>
{% endblock %}
